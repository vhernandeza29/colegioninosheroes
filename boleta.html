<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link class="icon" href="data:,">
    <title>Consulta de Calificaciones - Colegio Niños Héroes</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
   <style>
    :root {
        --azul-id: #193E9A;
        --verde-id: #317F77;
        --gris-fondo: #F0F2F5;
        --blanco: #FFFFFF;
    }

    /* Forzamos la tipografía nativa de Bootstrap */
    body {
        background-color: var(--gris-fondo);
    }

    /* NAVBAR UNIFICADO */
    .navbar-brand { 
        font-weight: 800; 
        color: var(--azul-id) !important; 
        display: flex;
        align-items: center;
    }

    .btn-volver { 
        border: 2px solid var(--azul-id); 
        color: var(--azul-id); 
        font-weight: 700; 
        border-radius: 10px; 
        padding: 5px 20px; 
        transition: 0.3s; 
        text-decoration: none !important; 
        display: inline-block; 
    }
    .btn-volver:hover { background: var(--azul-id); color: white !important; }

    /* EL HERO UNIFICADO CON EL DE CALENDARIOS (Optimizados los tamaños) */
    .hero {
        background: linear-gradient(135deg, #317F77 0%, #317F77 100%);
        padding: 60px 0; 
        text-align: center;
        color: white;
        margin-bottom: 20px;
    }
    .hero h1 {
        font-weight: 800;
        font-size: 2.2rem; 
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
    }

    /* BUSCADOR */
    .search-container { 
        max-width: 600px; 
        margin: 0 auto 40px; 
    }
    .search-box-wrapper {
        display: flex;
        gap: 10px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        background: white;
        padding: 10px;
        border-radius: 15px;
        border: 1px solid #ddd;
    }
    #matriculaInput { 
        border: 1px solid #ced4da; 
        border-radius: 10px;
        padding-left: 15px; 
        height: 50px; 
        font-size: 1.1rem; 
        font-weight: 600;
    }
    .btn-buscar { 
        background: var(--verde-id) !important; 
        color: white !important; 
        border: none !important; 
        border-radius: 10px !important;
        padding: 0 35px; 
        font-weight: 800; 
        height: 50px;
    }

    .version-tag {
        font-size: 0.78rem;
        color: #a0aec0;
        margin-top: 12px;
        font-weight: 600;
        letter-spacing: 0.5px;
    }

    /* DISEÑO DE LA BOLETA MODERNA */
    .report-card-container {
        background: var(--blanco);
        padding: 40px;
        border-radius: 25px;
        box-shadow: 0 15px 50px rgba(0,0,0,0.1);
        margin: 0 auto 50px;
        max-width: 850px;
        display: none;
        position: relative;
        overflow: hidden;
    }

    .sello-agua-fondo {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) rotate(-10deg);
        width: 420px;
        height: auto;
        opacity: 0.05;
        pointer-events: none;
        z-index: 1;
    }

    .contenedor-sello-dorado {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 25px;
        padding-top: 10px;
        position: relative;
    }
    .sello-dorado {
        width: 130px; 
        height: auto;
        opacity: 0.95;
        mix-blend-mode: multiply;
        pointer-events: none;
    }

    /* Firmas autorizadas */
    .contenedor-firmas {
        display: flex;
        justify-content: space-between;
        margin-top: 15px;
        padding: 0 20px;
        text-align: center;
    }
    .col-firma {
        width: 45%;
    }
    .linea-firma {
        border-top: 1px solid #cbd5e0;
        margin-bottom: 5px;
    }
    .nombre-firma {
        font-size: 0.88rem;
        font-weight: 700;
        color: #2d3748;
        margin: 0;
    }
    .puesto-firma {
        font-size: 0.78rem;
        font-weight: 600;
        color: #718096;
        margin: 0;
        text-transform: uppercase;
    }

    .boleta-content-wrapper {
        position: relative;
        z-index: 2;
    }

    .header-boleta {
        margin: -40px -40px 30px -40px;
        padding: 30px 40px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background-color: #fff;
        border-bottom: 2px solid #edf2f7;
    }
    
    .logo-boleta { height: 95px; }
    .school-info { text-align: right; }
    .school-name { font-weight: 800; font-size: 1.7rem; color: var(--azul-id); margin: 0; }
    .school-subtitle { font-weight: 700; font-size: 1.1rem; color: var(--verde-id); margin: 2px 0 0; }
    .school-address { font-size: 0.75rem; margin: 4px 0 0; color: #718096; line-height: 1.3; }

    .boleta-title-box { text-align: center; margin-bottom: 25px; }
    
    .bg-titulo-maternal { background-color: #FFF5B7 !important; color: #5d4037 !important; }
    .bg-titulo-preescolar { background-color: #FFB7CE !important; color: #4a148c !important; }
    .bg-titulo-primaria { background-color: #C1E7C4 !important; color: #1b5e20 !important; }
    .bg-titulo-secundaria { background-color: #B3E5FC !important; color: #0d47a1 !important; }
    .bg-titulo-prepa { background-color: #E1BEE7 !important; color: #4a148c !important; }

    .boleta-title-text {
        font-weight: 800;
        font-size: 1.1rem;
        text-transform: uppercase;
        padding: 10px 35px;
        border-radius: 20px;
        display: inline-block;
        letter-spacing: 1px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .student-info-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        background-color: #F7FAFC;
        padding: 20px;
        border-radius: 15px;
        margin-bottom: 25px;
        font-size: 0.9rem;
    }
    .info-item { display: flex; align-items: center; }
    .info-label { font-weight: 700; color: #4A5568; min-width: 120px; text-transform: uppercase; font-size: 0.75rem; }
    .info-value { flex-grow: 1; background-color: var(--blanco); padding: 6px 12px; border-radius: 8px; font-weight: 600; color: #2d3748; border: 1px solid #E2E8F0; }
    
    .final-grade-box {
        grid-column: span 2;
        background-color: #EBF8FF;
        border: 1px solid #90CDF4;
        border-radius: 10px;
        padding: 10px 20px;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        margin-top: 5px;
    }
    .final-grade-label { font-weight: 800; text-transform: uppercase; color: #2C5282; margin-right: 15px; font-size: 0.85rem; }
    .final-grade-value { font-size: 1.7rem; font-weight: 900; color: #2B6CB0; line-height: 1; }

    /* TABLAS ACCESIBLES */
    .grade-table-container { border-radius: 15px; overflow: hidden; border: 1px solid #E2E8F0; margin-bottom: 20px; }
    .grade-table { width: 100%; border-collapse: separate; border-spacing: 0; margin: 0; }
    .grade-table thead th { font-weight: 800; text-transform: uppercase; font-size: 0.82rem; padding: 14px 10px; text-align: center; border: none; }
    .grade-table thead th.subject-col { text-align: left; padding-left: 25px; }
    .grade-table tbody tr td { padding: 14px 10px; text-align: center; font-weight: 700; font-size: 0.95rem; border: none; border-bottom: 1px solid rgba(0,0,0,0.04) !important; }
    .grade-table tbody tr td.subject-col { text-align: left; padding-left: 25px; font-weight: 800; }

    /* PALETAS DE COLOR */
    .pastel-amarillo thead th { background-color: #FBC02D !important; color: #5d4037 !important; }
    .pastel-amarillo tbody tr td { background-color: #FFF9C4 !important; color: #5d4037 !important; }
    .pastel-amarillo tbody tr td.promedio-col { background-color: #FBC02D !important; font-weight: 900 !important; }

    .pastel-preescolar thead th { background-color: #F48FB1 !important; color: #4a148c !important; }
    .pastel-preescolar tbody tr td { background-color: #FCE4EC !important; color: #4a148c !important; }
    .pastel-preescolar tbody tr td.promedio-col { background-color: #F48FB1 !important; font-weight: 900 !important; }

    .pastel-verde thead th { background-color: #81C784 !important; color: #1b5e20 !important; }
    .pastel-verde tbody tr td { background-color: #E8F5E9 !important; color: #1b5e20 !important; }
    .pastel-verde tbody tr td.promedio-col { background-color: #81C784 !important; font-weight: 900 !important; }

    .pastel-azul thead th { background-color: #4FC3F7 !important; color: #0d47a1 !important; }
    .pastel-azul tbody tr td { background-color: #E1F5FE !important; color: #0d47a1 !important; }
    .pastel-azul tbody tr td.promedio-col { background-color: #4FC3F7 !important; font-weight: 900 !important; }

    .pastel-lila thead th { background-color: #BA68C8 !important; color: #4a148c !important; }
    .pastel-lila tbody tr td { background-color: #F3E5F5 !important; color: #4a148c !important; }
    .pastel-lila tbody tr td.promedio-col { background-color: #BA68C8 !important; font-weight: 900 !important; }

    /* RESPONSIVO PARA EL NAVBAR (CELULARES) */
    @media (max-width: 768px) {
        .navbar .container {
            flex-direction: column !important; /* Coloca el logo arriba y el botón abajo */
            gap: 12px;
            text-align: center;
        }
        .navbar-brand {
            font-size: 1.3rem;
            justify-content: center;
            margin-right: 0;
        }
        .navbar-brand img {
            height: 40px !important;
        }
        .btn-volver {
            width: 100%;
            max-width: 200px;
            text-align: center;
        }
    }

    @media print {
        body { background-color: white !important; }
        * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        .no-print, .hero-banner, .search-container, .navbar, .hero { display: none !important; }
        .report-card-container { display: block !important; border: none; box-shadow: none; padding: 0; margin: 0; width: 100%; max-width: 100%; border-radius: 0; }
        .header-boleta { margin: 0 0 30px 0; padding: 20px 0; }
        .page-break { page-break-before: always; }
        .sello-agua-fondo { opacity: 0.06 !important; }
        .sello-dorado { opacity: 1 !important; filter: none !important; }
    }
</style>
</head>

<body>

    <!-- REEMPLAZA TU <nav> ACTUAL EN BOLETAS POR ESTE EXACTAMENTE -->
<nav class="navbar navbar-expand-lg sticky-top navbar-light bg-white shadow-sm">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand" href="index.html" style="font-weight: 800; color: #193E9A !important; display: flex; align-items: center;">
            <img src="Iconos/logo.png" style="height: 50px;" class="mr-2"> Colegio Niños Héroes
        </a>
        <a href="comunidad.html" class="btn-volver">← Volver</a>
    </div>
</nav>

    <header class="hero">
        <div class="container">
            <h1>Portal de Boletas Oficiales</h1>
            <p class="lead">Introduce la matrícula para generar las boletas a partir de los registros del repositorio.</p>
        </div>
    </header>

    <div class="container search-container no-print" id="searchSection" style="opacity: 0.5; pointer-events: none;">
        <div class="search-box-wrapper">
            <input type="text" id="matriculaInput" class="form-control" placeholder="Cargando base de datos, espere...">
            <button class="btn btn-buscar" onclick="buscarBoletasExcel()">BUSCAR</button>
        </div>
        
        <div class="text-center version-tag" id="loadStatus">
            <i class="fas fa-spinner fa-spin mr-1"></i> Sincronizando archivos. 419
        </div>
        
        <div id="statusMsg" class="text-center mt-3 font-weight-bold"></div>
        <div class="text-center mt-3" id="printBtnContainer" style="display:none;">
            <button class="btn btn-danger btn-lg shadow" onclick="window.print()">
                <i class="fas fa-file-pdf mr-2"></i> DESCARGAR PDF / IMPRIMIR BOLETAS
            </button>
        </div>
    </div>

    <div id="reportCardExtra" class="report-card-container"></div>
    <div id="reportCardIngles" class="report-card-container page-break"></div>
<script>
        const RUTA_EXCEL_EXTRA = "Datos/BoletaExtracurriculares.xlsx";
        const RUTA_EXCEL_INGLES = "Datos/BoletaInglés.xlsx";
        
        let BASE_EXTRA_MEMORIA = {};
        let BASE_INGLES_MEMORIA = {};

        // Convertimos a mayúsculas todo el mapa de validación para evitar fallos de case-sensitivity
        const MATERIAS_MAP = {
            ingles: (nivelTexto) => {
                const nl = (nivelTexto || "").toUpperCase();
                if (nl.includes('MATERNAL') || nl.includes('KINDER') || nl.includes('PREESCOLAR')) return ['LISTENING', 'READING'];
                return ['LISTENING', 'READING', 'WRITING', 'SPEAKING', 'COMPOSITION'];
            },
            extra: (nivelTexto) => {
                const nl = (nivelTexto || "").toUpperCase();
                if (nl.includes('MATERNAL') || nl.includes('KINDER') || nl.includes('PREESCOLAR')) return ['EDUCACIÓN FÍSICA', 'DANZA', 'MÚSICA', 'TOCHO BANDERA', 'TAEKWONDO', 'INFORMÁTICA', 'EMOCIONES'];
                if (nl.includes('PRIMARIA 1') || nl.includes('PRIMARIA 2')) return ['EDUCACIÓN FÍSICA', 'DANZA', 'MÚSICA', 'TOCHO BANDERA', 'TAEKWONDO', 'INFORMÁTICA', 'JUEGOS Y DESTREZAS', 'ROBÓTICA', 'EDUCACIÓN FINANCIERA', 'SISTÉMICA', 'LECTURA', 'SPELLING BEE'];
                if (nl.includes('PRIMARIA')) return ['EDUCACIÓN FÍSICA', 'DANZA', 'MÚSICA', 'TOCHO BANDERA', 'TAEKWONDO', 'INFORMÁTICA', 'JUEGOS Y DESTREZAS', 'ROBÓTICA', 'EDUCACIÓN FINANCIERA', 'SISTÉMICA'];
                if (nl.includes('SECUNDARIA 2')) return ['EDUCACIÓN FÍSICA', 'DANZA', 'ARTES', 'MÚSICA', 'TOCHO BANDERA', 'TAEKWONDO', 'INFORMÁTICA', 'HERRAMIENTAS DIGITALES', 'AJEDREZ', 'ROBÓTICA', 'ORTOGRAFÍA', 'SISTÉMICA'];
                if (nl.includes('SECUNDARIA')) return ['EDUCACIÓN FÍSICA', 'DANZA', 'ARTES', 'MÚSICA', 'TOCHO BANDERA', 'TAEKWONDO', 'INFORMÁTICA', 'HERRAMIENTAS DIGITALES', 'AJEDREZ', 'ROBÓTICA', 'SISTÉMICA'];
                if (nl.includes('PREPARATORIA')) return ['EDUCACIÓN FÍSICA', 'DANZA', 'ARTES', 'TOCHO BANDERA', 'TAEKWONDO', 'INFORMÁTICA', 'HERRAMIENTAS DIGITALES', 'AJEDREZ', 'ROBÓTICA'];
                return [];
            }
        };

        window.addEventListener('DOMContentLoaded', () => {
            cargarBasesDeGitHub();
        });

        async function cargarBasesDeGitHub() {
            const labelStatus = document.getElementById('loadStatus');
            const inputMat = document.getElementById('matriculaInput');
            try {
                const [resExtra, resIngles] = await Promise.all([
                    fetch(RUTA_EXCEL_EXTRA),
                    fetch(RUTA_EXCEL_INGLES)
                ]);

                if (!resExtra.ok) throw new Error("No se pudo leer: " + RUTA_EXCEL_EXTRA);
                if (!resIngles.ok) throw new Error("No se pudo leer: " + RUTA_EXCEL_INGLES);
                
                const [bufExtra, bufIngles] = await Promise.all([
                    resExtra.arrayBuffer(),
                    resIngles.arrayBuffer()
                ]);

                BASE_EXTRA_MEMORIA = parsearLibroExcel(bufExtra);
                BASE_INGLES_MEMORIA = parsearLibroExcel(bufIngles);

                labelStatus.innerHTML = "<span class='text-success'><i class='fas fa-check-circle mr-1'></i> Repositorio sincronizado correctamente.</span>";
                inputMat.placeholder = "Ingrese la matrícula del alumno...";
                document.getElementById('searchSection').style.opacity = "1";
                document.getElementById('searchSection').style.pointerEvents = "auto";

            } catch (err) {
                console.error(err);
                labelStatus.innerHTML = `<span class='text-danger'><i class='fas fa-times-circle mr-1'></i> Error al cargar datos. Revisa las rutas en tu carpeta 'Datos'.</span>`;
            }
        }

        function parsearLibroExcel(arrayBuffer) {
            const data = new Uint8Array(arrayBuffer);
            const workbook = XLSX.read(data, { type: 'array' });
            let mapeoTemporal = {};

            workbook.SheetNames.forEach(sheetName => {
                const worksheet = workbook.Sheets[sheetName];
                const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                
                if (rows.length < 3) return;

                // CORRECCIÓN AQUÍ: rows[0] apunta a la Fila 1 de Excel (donde están los nombres reales de las materias)
                const materiasRow = rows[0];
                const esPrepa = sheetName.toUpperCase().includes('PREPARATORIA');

                // Las calificaciones de los alumnos inician en la Fila 3 de Excel (índice 2)
                for (let r = 2; r < rows.length; r++) {
                    const studentRow = rows[r];
                    if (!studentRow[0]) continue;

                    const matricula = studentRow[0].toString().trim().toUpperCase();

                    mapeoTemporal[matricula] = {
                        nombre: studentRow[1],
                        matricula: matricula,
                        ciclo: studentRow[2],
                        grado: studentRow[3],
                        grupo: studentRow[4],
                        nivel: sheetName, 
                        esPrepa: esPrepa,
                        materiasRow: materiasRow,
                        studentRow: studentRow
                    };
                }
            });
            return mapeoTemporal;
        }

        function normalizarTexto(texto) {
            if (!texto) return "";
            return texto.toString().trim().toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        }

        function obtenerNivelEducativoFormateado(nivelTexto) {
            const nl = (nivelTexto || "").toUpperCase();
            if (nl.includes('MATERNAL')) return 'Maternal';
            if (nl.includes('KINDER') || nl.includes('PREESCOLAR')) return 'Preescolar';
            if (nl.includes('PRIMARIA')) return 'Primaria';
            if (nl.includes('SECUNDARIA')) return 'Secundaria';
            if (nl.includes('PREPARATORIA') || nl.includes('PREPA')) return 'Bachillerato';
            return nivelTexto;
        }

        const fmt = (v) => {
            if (v === undefined || v === null || v === "" || isNaN(v)) return '-';
            return (Math.floor(parseFloat(v) * 10) / 10).toFixed(1);
        };

        function buscarBoletasExcel() {
            const mat = document.getElementById('matriculaInput').value.trim().toUpperCase();
            const status = document.getElementById('statusMsg');

            if (!mat) { status.innerText = "Por favor, ingrese una matrícula válida."; return; }

            document.getElementById('reportCardExtra').style.display = 'none';
            document.getElementById('reportCardIngles').style.display = 'none';
            document.getElementById('printBtnContainer').style.display = 'none';

            const alumnoExtra = BASE_EXTRA_MEMORIA[mat];
            const alumnoIngles = BASE_INGLES_MEMORIA[mat];

            if (alumnoExtra || alumnoIngles) {
                status.innerHTML = "<span class='text-success'>¡Información cargada con éxito!</span>";
                document.getElementById('printBtnContainer').style.display = 'block';

                if (alumnoExtra) {
                    renderizarFilaExcel(alumnoExtra, 'Extra', 'ASIGNATURAS EXTRACURRICULARES', 'extra');
                }
                if (alumnoIngles) {
                    renderizarFilaExcel(alumnoIngles, 'Ingles', 'BOLETA DE INGLÉS', 'ingles');
                }
            } else {
                status.innerHTML = `<span class='text-danger'>La matrícula "${mat}" no se encuentra registrada.</span>`;
            }
        }

        function obtenerFirmasPorNivel(nivelTexto) {
            const nl = (nivelTexto || "").toUpperCase();
            let director = "";
            let controlEscolar = "";

            if (nl.includes('MATERNAL') || nl.includes('PREESCOLAR') || nl.includes('KINDER')) {
                director = "Alejandro Guevara Esquivel";
                controlEscolar = "Ana Laura Miranda Jacome";
            } else if (nl.includes('PRIMARIA')) {
                director = "Lorena Segura Neri";
                controlEscolar = "Amanda Dariana Villeda Díaz";
            } else if (nl.includes('SECUNDARIA')) {
                director = "Lorena Segura Neri";
                controlEscolar = "María Guadalupe Sánchez Rojas";
            } else if (nl.includes('PREPARATORIA') || nl.includes('PREPA')) {
                director = "Alejandro Guevara Esquivel";
                controlEscolar = "Lorena Segura Neri";
            }

            return { director, controlEscolar };
        }

        function renderizarFilaExcel(alumno, idS, tituloFormateado, tipoMateria) {
            const studentRow = alumno.studentRow;
            const materiasRow = alumno.materiasRow;
            
            // --- BLOQUE DE DIAGNÓSTICO EN CONSOLA ---
            console.log(`=== DIAGNÓSTICO PARA: ${tituloFormateado} ===`);
            console.log("Nombre de la pestaña (nivel detectado):", alumno.nivel);
            
            const filtroOriginal = MATERIAS_MAP[tipoMateria](alumno.nivel);
            console.log("Materias esperadas para este nivel (según tu MATERIAS_MAP):", filtroOriginal);
            
            const filtroNormalizado = filtroOriginal.map(m => normalizarTexto(m));
            let listaMaterias = [];

            const limiteColumnas = Math.max(studentRow.length, materiasRow.length);

            // Recorremos desde la columna F (índice 5)
            for (let i = 5; i < limiteColumnas; i++) {
                if (!materiasRow[i] || materiasRow[i].toString().trim() === "") continue;

                let nombreMateriaCelda = materiasRow[i].toString().trim();
                let nombreMateriaNorm = normalizarTexto(nombreMateriaCelda);

                if (nombreMateriaNorm.includes("CICLO") || nombreMateriaNorm === "PROMEDIO" || nombreMateriaNorm === "PROMEDIO FINAL") {
                    continue;
                }

                console.log(`Columna ${i} - Encontrado en Excel: "${nombreMateriaCelda}"`);

                if (filtroNormalizado.length === 0 || filtroNormalizado.includes(nombreMateriaNorm)) {
                    
                    let v1 = fmt(studentRow[i]);       // T1 o S1
                    let v2 = fmt(studentRow[i+1]);     // T2 o S2
                    let v3 = alumno.esPrepa ? null : fmt(studentRow[i+2]);  // T3 (Solo si no es Prepa)
                    let vf = alumno.esPrepa ? fmt(studentRow[i+2]) : fmt(studentRow[i+3]); // PF

                    listaMaterias.push({
                        n: nombreMateriaCelda.toUpperCase(),
                        v1: v1,             
                        v2: v2,           
                        v3: v3, 
                        vf: vf 
                    });
                    
                    // Salto adaptativo corregido: 2 columnas extras para Prepa, 3 para los demás niveles
                    i += (alumno.esPrepa ? 2 : 3);
                }
            }
            console.log("Total de materias que pasaron el filtro y se van a dibujar:", listaMaterias.length);
            console.log("========================================");
            // --- FIN DEL BLOQUE DE DIAGNÓSTICO ---

            let pf = "-";
            for (let k = studentRow.length - 1; k >= 5; k--) {
                if (studentRow[k] !== undefined && studentRow[k] !== null && !isNaN(studentRow[k]) && studentRow[k].toString().trim() !== "") {
                    pf = fmt(studentRow[k]);
                    break;
                }
            }

            const div = document.getElementById(`reportCard${idS}`);
            div.style.display = 'block';
            
            const clasePastel = alumno.nivel ? (
                alumno.nivel.toUpperCase().includes('MATERNAL') ? 'pastel-amarillo' :
                alumno.nivel.toUpperCase().includes('KINDER') || alumno.nivel.toUpperCase().includes('PREESCOLAR') ? 'pastel-preescolar' :
                alumno.nivel.toUpperCase().includes('PRIMARIA') ? 'pastel-verde' :
                alumno.nivel.toUpperCase().includes('SECUNDARIA') ? 'pastel-azul' :
                alumno.nivel.toUpperCase().includes('PREPARATORIA') ? 'pastel-lila' : ''
            ) : '';

            const claseTituloColor = alumno.nivel ? (
                alumno.nivel.toUpperCase().includes('MATERNAL') ? 'bg-titulo-maternal' :
                alumno.nivel.toUpperCase().includes('KINDER') || alumno.nivel.toUpperCase().includes('PREESCOLAR') ? 'bg-titulo-preescolar' :
                alumno.nivel.toUpperCase().includes('PRIMARIA') ? 'bg-titulo-primaria' :
                alumno.nivel.toUpperCase().includes('SECUNDARIA') ? 'bg-titulo-secundaria' :
                alumno.nivel.toUpperCase().includes('PREPARATORIA') ? 'bg-titulo-prepa' : ''
            ) : '';

            // Obtener nombres de las firmas dinámicas y limpiar el texto del nivel educativo
            const firmas = obtenerFirmasPorNivel(alumno.nivel);
            const nivelLimpio = obtenerNivelEducativoFormateado(alumno.nivel);

            div.innerHTML = `
                <img src="Iconos/logo.png" class="sello-agua-fondo">
                <div class="boleta-content-wrapper">
                    <div class="header-boleta">
                        <img src="Iconos/logo.png" class="logo-boleta">
                        <div class="school-info">
                            <h1 class="school-name">COLEGIO NIÑOS HÉROES</h1>
                            <h2 class="school-subtitle">Sección Académica</h2>
                            <p class="school-address">DURANGO S/N AMP. ADOLFO LÓPEZ MATEOS, ATIZAPÁN DE ZARAGOZA.<br>TELS: 58204881 Y 5590557078</p>
                        </div>
                    </div>

                    <div class="boleta-title-box">
                        <div class="boleta-title-text ${claseTituloColor}">${tituloFormateado}</div>
                    </div>

                    <div class="student-info-grid">
                        <div class="info-item"><span class="info-label">Ciclo Escolar:</span> <span class="info-value">${alumno.ciclo || '-'}</span></div>
                        <div class="info-item"><span class="info-label">Nivel Educativo:</span> <span class="info-value" style="text-transform: uppercase;">${nivelLimpio}</span></div>
                        <div class="info-item"><span class="info-label">Alumno:</span> <span class="info-value">${alumno.nombre || '-'}</span></div>
                        <div class="info-item"><span class="info-label">Grado y Grupo:</span> <span class="info-value">${alumno.grado || '-'} "${alumno.grupo || '-'}"</span></div>
                        
                        <div class="final-grade-box">
                            <span class="final-grade-label">Calificación Final General:</span>
                            <span class="final-grade-value">${pf}</span>
                        </div>
                    </div>

                    <p style="font-style: italic; font-size: 0.82rem; text-align: center; margin: 20px 0; color: #718096; padding: 0 30px; line-height: 1.4;">
                        "La educación no solo forma estudiantes, forma seres humanos capaces de soñar en grande, de levantarse ante las dificultades y de construir con esfuerzo y valores el futuro que deseas alcanzar."
                    </p>

                    <div class="grade-table-container">
                        <table class="grade-table ${clasePastel}">
                            <thead>
                                <tr>
                                    <th class="subject-col">Materias</th>
                                    ${alumno.esPrepa ? '<th>1er Sem</th><th>2do Sem</th>' : '<th>1er Trim</th><th>2do Trim</th><th>3er Trim</th>'}
                                    <th>Promedio Final</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${listaMaterias.length === 0 ? `
                                    <tr>
                                        <td colspan="${alumno.esPrepa ? 4 : 5}" class="text-center text-muted" style="padding: 20px; background: #fff;">
                                            No se encontraron materias que coincidan con el filtro de tu código. <br>
                                            <small class="text-danger">Abre la Consola del Desarrollador (F12) para ver la causa exacta.</small>
                                        </td>
                                    </tr>
                                ` : listaMaterias.map(m => `
                                    <tr>
                                        <td class="subject-col">${m.n}</td>
                                        <td>${m.v1}</td>
                                        <td>${m.v2}</td>
                                        ${!alumno.esPrepa ? `<td>${m.v3}</td>` : ''}
                                        <td class="promedio-col">${m.vf}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>

                    <div class="contenedor-sello-dorado">
                        <img src="Iconos/sello.png" class="sello-dorado">
                    </div>

                    <div class="contenedor-firmas">
                        <div class="col-firma">
                            <div class="linea-firma"></div>
                            <p class="nombre-firma">${firmas.director}</p>
                            <p class="puesto-firma">Director General</p>
                        </div>
                        <div class="col-firma">
                            <div class="linea-firma"></div>
                            <p class="nombre-firma">${firmas.controlEscolar}</p>
                            <p class="puesto-firma">Control Escolar</p>
                        </div>
                    </div>
                </div>
            `;
        }
</script>
</body>
</html>
