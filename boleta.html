<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:,">
    <title>Consulta de Calificaciones - Colegio Niños Héroes</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --azul-id: #193E9A;
            --verde-id: #317F77;
            --gris-fondo: #F0F2F5;
            --blanco: #FFFFFF;
        }

        body {
            background-color: var(--gris-fondo);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* NAVBAR */
        .navbar { 
            padding: 15px 40px; 
            background: var(--blanco); 
            border-bottom: 1px solid #eee; 
        }
        .navbar-brand { 
            display: flex; 
            align-items: center; 
            font-weight: 800; 
            color: var(--azul-id) !important; 
            font-size: 1.6rem; 
        }
        .logo-nav { 
            height: 40px; 
            margin-right: 15px; 
        }
        .btn-volver { 
            border: 1.5px solid var(--azul-id); 
            color: var(--azul-id); 
            font-weight: 600; 
            border-radius: 12px; 
            padding: 6px 25px; 
            text-decoration: none !important; 
            transition: 0.3s; 
        }
        .btn-volver:hover { 
            background: var(--azul-id); 
            color: white !important; 
        }

        /* HERO BANNER */
        .hero-banner { 
            background: linear-gradient(90deg, #193E9A 0%, #317F77 100%); 
            padding: 50px 20px; 
            text-align: center; 
            color: white; 
            margin-bottom: 30px; 
        }
        .hero-banner h1 { 
            font-weight: 800; 
            font-size: 2.8rem; 
            margin-bottom: 10px; 
        }
        
        /* BUSCADOR SIMPLIFICADO */
        .search-container { 
            max-width: 600px; 
            margin: 0 auto 40px; 
        }
        .search-box-wrapper {
            display: flex;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            background: white;
            padding: 10px;
            border-radius: 15px;
            border: 1px solid #ddd;
        }
        #matriculaInput { 
            border: 1px solid #ced4da; 
            border-radius: 10px;
            padding-left: 15px; 
            height: 50px; 
            font-size: 1.1rem; 
            font-weight: 600;
        }
        .btn-buscar { 
            background: var(--verde-id) !important; 
            color: white !important; 
            border: none !important; 
            border-radius: 10px !important;
            padding: 0 35px; 
            font-weight: 800; 
            height: 50px;
        }

        /* DISEÑO DE LA BOLETA MODERNA */
        .report-card-container {
            background: var(--blanco);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.1);
            margin: 0 auto 50px;
            max-width: 850px;
            display: none;
            overflow: hidden;
        }

        /* CABECERA INSTITUCIONAL */
        .header-boleta {
            margin: -40px -40px 30px -40px;
            padding: 30px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #fff;
            border-bottom: 2px solid #edf2f7;
        }
        .logo-boleta { height: 85px; }
        .school-info { text-align: right; }
        .school-name { font-weight: 800; font-size: 1.7rem; color: var(--azul-id); margin: 0; }
        .school-subtitle { font-weight: 700; font-size: 1.1rem; color: var(--verde-id); margin: 2px 0 0; }
        .school-address { font-size: 0.75rem; margin: 4px 0 0; color: #718096; line-height: 1.3; }

        .boleta-title-box { text-align: center; margin-bottom: 25px; }
        
        /* PALETAS DE COLOR TEMÁTICAS SEGÚN NIVEL */
        .bg-titulo-maternal { background-color: #FFF5B7 !important; color: #5d4037 !important; }
        .bg-titulo-preescolar { background-color: #FFB7CE !important; color: #4a148c !important; }
        .bg-titulo-primaria { background-color: #C1E7C4 !important; color: #1b5e20 !important; }
        .bg-titulo-secundaria { background-color: #B3E5FC !important; color: #0d47a1 !important; }
        .bg-titulo-prepa { background-color: #E1BEE7 !important; color: #4a148c !important; }

        .boleta-title-text {
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            padding: 10px 35px;
            border-radius: 20px;
            display: inline-block;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* DETALLES DEL ALUMNO */
        .student-info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            background-color: #F7FAFC;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }
        .info-item { display: flex; align-items: center; }
        .info-label { font-weight: 700; color: #4A5568; min-width: 120px; text-transform: uppercase; font-size: 0.75rem; }
        .info-value { flex-grow: 1; background-color: var(--blanco); padding: 6px 12px; border-radius: 8px; font-weight: 600; color: #2d3748; border: 1px solid #E2E8F0; }
        
        .final-grade-box {
            grid-column: span 2;
            background-color: #EBF8FF;
            border: 1px solid #90CDF4;
            border-radius: 10px;
            padding: 10px 20px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-top: 5px;
        }
        .final-grade-label { font-weight: 800; text-transform: uppercase; color: #2C5282; margin-right: 15px; font-size: 0.85rem; }
        .final-grade-value { font-size: 1.7rem; font-weight: 900; color: #2B6CB0; line-height: 1; }

        /* TABLA CONFIGURABLE CON COLORES ARMÓNICOS */
        .grade-table-container { border-radius: 15px; overflow: hidden; border: 1px solid #E2E8F0; }
        .grade-table { width: 100%; border-collapse: separate; border-spacing: 0; margin: 0; }
        .grade-table thead th { font-weight: 800; text-transform: uppercase; font-size: 0.82rem; padding: 14px 10px; text-align: center; border: none; }
        .grade-table thead th.subject-col { text-align: left; padding-left: 25px; }
        .grade-table tbody tr td { padding: 14px 10px; text-align: center; font-weight: 700; font-size: 0.95rem; border: none; border-bottom: 1px solid rgba(0,0,0,0.04) !important; }
        .grade-table tbody tr td.subject-col { text-align: left; padding-left: 25px; font-weight: 800; }

        /* --- CONTROL DE TONOS DE TABLA SEGÚN NIVEL --- */
        .pastel-amarillo thead th { background-color: #FBC02D !important; color: #5d4037 !important; }
        .pastel-amarillo tbody tr td { background-color: #FFF9C4 !important; color: #5d4037 !important; }
        .pastel-amarillo tbody tr td.promedio-col { background-color: #FBC02D !important; font-weight: 900 !important; }

        .pastel-preescolar thead th { background-color: #F48FB1 !important; color: #4a148c !important; }
        .pastel-preescolar tbody tr td { background-color: #FCE4EC !important; color: #4a148c !important; }
        .pastel-preescolar tbody tr td.promedio-col { background-color: #F48FB1 !important; font-weight: 900 !important; }

        .pastel-verde thead th { background-color: #81C784 !important; color: #1b5e20 !important; }
        .pastel-verde tbody tr td { background-color: #E8F5E9 !important; color: #1b5e20 !important; }
        .pastel-verde tbody tr td.promedio-col { background-color: #81C784 !important; font-weight: 900 !important; }

        .pastel-azul thead th { background-color: #4FC3F7 !important; color: #0d47a1 !important; }
        .pastel-azul tbody tr td { background-color: #E1F5FE !important; color: #0d47a1 !important; }
        .pastel-azul tbody tr td.promedio-col { background-color: #4FC3F7 !important; font-weight: 900 !important; }

        .pastel-lila thead th { background-color: #BA68C8 !important; color: #4a148c !important; }
        .pastel-lila tbody tr td { background-color: #F3E5F5 !important; color: #4a148c !important; }
        .pastel-lila tbody tr td.promedio-col { background-color: #BA68C8 !important; font-weight: 900 !important; }

        /* SECCIÓN DE FIRMAS */
        .signature-section { margin-top: 70px; display: flex; justify-content: space-around; padding: 0 30px; }
        .sign-box { border-top: 1.5px solid #718096; width: 240px; text-align: center; font-size: 0.75rem; font-weight: 700; padding-top: 8px; color: #4A5568; letter-spacing: 0.5px; }

        /* IMPRESIÓN */
        @media print {
            body { background-color: white !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .no-print, .hero-banner, .search-container, .navbar { display: none !important; }
            .report-card-container { display: block !important; border: none; box-shadow: none; padding: 0; margin: 0; width: 100%; max-width: 100%; border-radius: 0; }
            .header-boleta { margin: 0 0 30px 0; padding: 20px 0; }
            .page-break { page-break-before: always; }
        }
    </style>
</head>

<body>

    <nav class="navbar no-print">
        <div class="navbar-brand"><img src="Iconos/logo.png" class="logo-nav"> Colegio Niños Héroes</div>
        <a href="index.html" class="btn-volver">← Volver</a>
    </nav>

    <div class="hero-banner no-print">
        <div class="container">
            <h1>Portal de Boletas Oficiales</h1>
            <p>Introduce la matrícula del alumno para generar sus boletas institucionales.</p>
        </div>
    </div>

    <div class="container search-container no-print">
        <div class="search-box-wrapper">
            <input type="text" id="matriculaInput" class="form-control" placeholder="Ingrese la matrícula del alumno...">
            <button class="btn btn-buscar" onclick="buscarBoletas()">BUSCAR</button>
        </div>
        
        <div id="statusMsg" class="text-center mt-3 font-weight-bold"></div>
        <div class="text-center mt-3" id="printBtnContainer" style="display:none;">
            <button class="btn btn-danger btn-lg shadow" onclick="window.print()">
                <i class="fas fa-file-pdf mr-2"></i> DESCARGAR PDF / IMPRIMIR BOLETAS
            </button>
        </div>
    </div>

    <div id="reportCardExtra" class="report-card-container"></div>
    <div id="reportCardIngles" class="report-card-container page-break"></div>

    <script>
        const idExtra = '12m7RYtCBAF-P6t8_hoS3TkJwVX0tHEf7uaHAs6m0pTs';
        const idIngles = '1EY955TiJLZtpffxAtNQW3bjVuw8vHfYm_JYhX_6hXd4';

        // Lista ordenada de todas las pestañas posibles en tus Excel
        const PESTANAS_SISTEMA = [
            "Maternal", "Kinder 1", "Kinder 2", "Kinder 3",
            "Primaria 1", "Primaria 2", "Primaria 3", "Primaria 4", "Primaria 5", "Primaria 6",
            "Secundaria 1", "Secundaria 2", "Secundaria 3",
            "Preparatoria 1", "Preparatoria 2", "Preparatoria 3"
        ];

        const MATERIAS_MAP = {
            ingles: (n) => {
                const nl = n.toUpperCase();
                if (nl.includes('MATERNAL') || nl.includes('KINDER') || nl.includes('PREESCOLAR')) return ['LISTENING', 'READING'];
                return ['LISTENING', 'READING', 'WRITING', 'SPEAKING', 'COMPOSITION'];
            },
            extra: (n) => {
                const nl = n.toUpperCase();
                if (nl.includes('MATERNAL') || nl.includes('KINDER') || nl.includes('PREESCOLAR')) return ['EDUCACIÓN FISÍCA', 'DANZA', 'MÚSICA', 'TOCHO BANDERA', 'TAEKWONDO', 'INFORMÁTICA', 'EMOCIONES'];
                if (nl.includes('PRIMARIA 1') || nl.includes('PRIMARIA 2')) return ['EDUCACIÓN FISÍCA', 'DANZA', 'MÚSICA', 'TOCHO BANDERA', 'TAEKWONDO', 'INFORMÁTICA', 'JUEGOS Y DESTREZAS', 'ROBÓTICA', 'EDUCACIÓN FINANCIERA', 'SISTÉMICA', 'LECTURA', 'SPELLING BEE'];
                if (nl.includes('PRIMARIA')) return ['EDUCACIÓN FISÍCA', 'DANZA', 'MÚSICA', 'TOCHO BANDERA', 'TAEKWONDO', 'INFORMÁTICA', 'JUEGOS Y DESTREZAS', 'ROBÓTICA', 'EDUCACIÓN FINANCIERA', 'SISTÉMICA'];
                if (nl.includes('SECUNDARIA 2')) return ['EDUCACIÓN FISÍCA', 'DANZA', 'ARTES', 'MÚSICA', 'TOCHO BANDERA', 'TAEKWONDO', 'INFORMÁTICA', 'HERRAMIENTAS DIGITALES', 'AJEDREZ', 'ROBÓTICA', 'ORTOGRAFÍA', 'SISTÉMICA'];
                if (nl.includes('SECUNDARIA')) return ['EDUCACIÓN FISÍCA', 'DANZA', 'ARTES', 'MÚSICA', 'TOCHO BANDERA', 'TAEKWONDO', 'INFORMÁTICA', 'HERRAMIENTAS DIGITALES', 'AJEDREZ', 'ROBÓTICA', 'SISTÉMICA'];
                if (nl.includes('PREPARATORIA')) return ['EDUCACIÓN FISÍCA', 'DANZA', 'ARTES', 'TOCHO BANDERA', 'TAEKWONDO', 'INFORMÁTICA', 'HERRAMIENTAS DIGITALES', 'AJEDREZ', 'ROBÓTICA'];
                return [];
            }
        };

        function obtenerClaseColor(nivel) {
            const n = nivel.toUpperCase();
            if (n.includes('MATERNAL')) return 'pastel-amarillo';
            if (n.includes('KINDER') || n.includes('PREESCOLAR')) return 'pastel-preescolar';
            if (n.includes('PRIMARIA')) return 'pastel-verde';
            if (n.includes('SECUNDARIA')) return 'pastel-azul';
            if (n.includes('PREPARATORIA')) return 'pastel-lila';
            return '';
        }

        function obtenerClaseClaseTitulo(nivel) {
            const n = nivel.toUpperCase();
            if (n.includes('MATERNAL')) return 'bg-titulo-maternal';
            if (n.includes('KINDER') || n.includes('PREESCOLAR')) return 'bg-titulo-preescolar';
            if (n.includes('PRIMARIA')) return 'bg-titulo-primaria';
            if (n.includes('SECUNDARIA')) return 'bg-titulo-secundaria';
            if (n.includes('PREPARATORIA')) return 'bg-titulo-prepa';
            return '';
        }

        const fmt = (v) => {
            if (v === undefined || v === null || v === "" || isNaN(v)) return '-';
            return (Math.floor(parseFloat(v) * 10) / 10).toFixed(1);
        };

        async function buscarBoletas() {
            const mat = document.getElementById('matriculaInput').value.trim().toUpperCase();
            const status = document.getElementById('statusMsg');

            if (!mat) { status.innerText = "Por favor, ingrese una matrícula válida."; return; }

            status.innerHTML = "<i class='fas fa-spinner fa-spin mr-2'></i>Escaneando todos los niveles educativos en la base de datos...";

            document.getElementById('reportCardExtra').style.display = 'none';
            document.getElementById('reportCardIngles').style.display = 'none';

            // Escaneo secuencial inteligente por todas las pestañas
            let dEx = null;
            let dIn = null;

            for (const pestaña of PESTANAS_SISTEMA) {
                let textoNivelCompleto = pestaña.replace(/Kinder/i, 'Preescolar');
                
                let resEx = await obtenerDatosPorPestaña(idExtra, mat, 'extra', pestaña, textoNivelCompleto);
                if (resEx) {
                    dEx = resEx;
                    dIn = await obtenerDatosPorPestaña(idIngles, mat, 'ingles', pestaña, textoNivelCompleto);
                    break; 
                }
            }

            if (dEx || dIn) {
                status.innerHTML = "<span class='text-success'>¡Información cargada exitosamente!</span>";
                document.getElementById('printBtnContainer').style.display = 'block';
                if (dEx) renderBoleta(dEx, 'Extra', 'ASIGNATURAS EXTRACURRICULARES');
                if (dIn) renderBoleta(dIn, 'Ingles', 'BOLETA DE INGLÉS');
            } else {
                status.innerHTML = `<span class='text-danger'>Matrícula "${mat}" no encontrada en ningún nivel registrado. Verifique el código.</span>`;
                document.getElementById('printBtnContainer').style.display = 'none';
            }
        }

        async function obtenerDatosPorPestaña(sheetId, mat, tipo, nombrePestaña, textoNivelCompleto) {
            const url = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&sheet=${encodeURIComponent(nombrePestaña)}&tqx=cb:${Date.now()}`;
            try {
                const res = await fetch(url);
                if (!res.ok) return null;
                
                const csv = await res.text();
                const data = Papa.parse(csv, {header: false, skipEmptyLines: true}).data;
                
                let hIdx = -1;
                let colMatIdx = -1;
                
                for(let r=0; r<data.length; r++){
                    for(let c=0; c<data[r].length; c++){
                        if(data[r][c] && data[r][c].toString().trim().toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").includes("MATRICULA")){
                            hIdx = r;
                            colMatIdx = c;
                            break;
                        }
                    }
                    if(hIdx !== -1) break;
                }
                
                if (hIdx === -1 || colMatIdx === -1) return null;

                const materiasRow = data[0] || []; 
                const digitosBusqueda = mat.replace(/\D/g, ""); 

                const studentRow = data.find((r, idx) => {
                    if (idx <= hIdx || !r[colMatIdx]) return false;
                    const valCelda = r[colMatIdx].toString().trim().toUpperCase();
                    
                    if (valCelda === mat) return true;
                    
                    const digitosCelda = valCelda.replace(/\D/g, "");
                    if (digitosBusqueda && digitosCelda && parseInt(digitosBusqueda, 10) === parseInt(digitosCelda, 10)) {
                        return true;
                    }
                    return false;
                });

                if (studentRow) {
                    const esPrepa = nombrePestaña.toUpperCase().includes('PREPARATORIA');
                    const jump = esPrepa ? 3 : 4; 
                    const filtro = MATERIAS_MAP[tipo](textoNivelCompleto);
                    let listaMaterias = [];
                    
                    for (let i = 5; i < studentRow.length; i += jump) {
                        if (materiasRow[i] && (materiasRow[i].toString().trim().toUpperCase().includes("CICLO") || materiasRow[i].toString().trim().toUpperCase().includes("PROMEDIO"))) {
                            break;
                        }

                        let nombreM = materiasRow[i] ? materiasRow[i].toString().trim().toUpperCase() : "";

                        if (nombreM && filtro.includes(nombreM)) {
                            listaMaterias.push({
                                n: nombreM,
                                v1: fmt(studentRow[i]),             
                                v2: fmt(studentRow[i+1]),           
                                v3: esPrepa ? null : fmt(studentRow[i+2]), 
                                vf: esPrepa ? fmt(studentRow[i+2]) : fmt(studentRow[i+3]) 
                            });
                        }
                    }

                    let pf = "-";
                    for (let k = studentRow.length - 1; k >= 5; k--) {
                        if (studentRow[k] && !isNaN(studentRow[k]) && studentRow[k].toString().trim() !== "") {
                            pf = fmt(studentRow[k]);
                            break;
                        }
                    }

                    return { 
                        nombre: studentRow[1], mat: studentRow[0], ciclo: studentRow[2], 
                        grado: studentRow[3], grupo: studentRow[4], nivel: textoNivelCompleto, 
                        materias: listaMaterias, pf, esPrepa, tipo
                    };
                }
            } catch (e) { 
                // Silencioso para optimizar el escaneo rápido de pestañas
            }
            return null;
        }

        function renderBoleta(d, idS, tit) {
            const div = document.getElementById(`reportCard${idS}`);
            div.style.display = 'block';
            
            const firmaCoordinacion = d.tipo === 'ingles' ? 'COORDINACIÓN DE INGLÉS' : 'COORDINACIÓN DE MATERIAS EXTRACURRICULARES';
            const clasePastel = obtenerClaseColor(d.nivel);
            const claseTituloColor = obtenerClaseClaseTitulo(d.nivel);

            div.innerHTML = `
                <div class="header-boleta">
                    <img src="Iconos/logo.png" class="logo-boleta">
                    <div class="school-info">
                        <h1 class="school-name">COLEGIO NIÑOS HÉROES</h1>
                        <h2 class="school-subtitle">Sección Académica</h2>
                        <p class="school-address">DURANGO S/N AMP. ADOLFO LÓPEZ MATEOS, ATIZAPÁN DE ZARAGOZA.<br>TELS: 58204881 Y 5590557078</p>
                    </div>
                </div>

                <div class="boleta-title-box">
                    <div class="boleta-title-text ${claseTituloColor}">${tit}</div>
                </div>

                <div class="student-info-grid">
                    <div class="info-item"><span class="info-label">Ciclo Escolar:</span> <span class="info-value">${d.ciclo}</span></div>
                    <div class="info-item"><span class="info-label">Grado:</span> <span class="info-value">${d.grado}</span></div>
                    <div class="info-item"><span class="info-label">Alumno:</span> <span class="info-value">${d.nombre}</span></div>
                    <div class="info-item"><span class="info-label">Grupo:</span> <span class="info-value">${d.grupo}</span></div>
                    
                    <div class="final-grade-box">
                        <span class="final-grade-label">Calificación Final General:</span>
                        <span class="final-grade-value">${d.pf}</span>
                    </div>
                </div>

                <p style="font-style: italic; font-size: 0.82rem; text-align: center; margin: 25px 0; color: #718096; padding: 0 30px; line-height: 1.4;">
                    "La educación no solo forma estudiantes, forma seres humanos capaces de soñar en grande, de levantarse ante las dificultades y de construir con esfuerzo y valores el futuro que desean alcanzar."
                </p>

                <div class="grade-table-container">
                    <table class="grade-table ${clasePastel}">
                        <thead>
                            <tr>
                                <th class="subject-col">Materias</th>
                                ${d.esPrepa ? '<th>1er Sem</th><th>2do Sem</th>' : '<th>1er Trim</th><th>2do Trim</th><th>3er Trim</th>'}
                                <th>Promedio Final</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${d.materias.map(m => `
                                <tr>
                                    <td class="subject-col">${m.n}</td>
                                    <td>${m.v1}</td>
                                    <td>${m.v2}</td>
                                    ${!d.esPrepa ? `<td>${m.v3}</td>` : ''}
                                    <td class="promedio-col">${m.vf}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>

                <div class="signature-section">
                    <div class="sign-box">DIRECCIÓN GENERAL</div>
                    <div class="sign-box">${firmaCoordinacion}</div>
                </div>
            `;
        }
    </script>
</body>

</html>
