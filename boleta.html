<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <link class="icon" href="data:,">
    <title>Consulta de Calificaciones - Colegio Niños Héroes</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        :root {
            --azul-id: #193E9A;
            --verde-id: #317F77;
            --gris-fondo: #F0F2F5;
            --blanco: #FFFFFF;
        }

        body {
            background-color: var(--gris-fondo);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* NAVBAR */
        .navbar { 
            padding: 15px 40px; 
            background: var(--blanco); 
            border-bottom: 1px solid #eee; 
        }
        .navbar-brand { 
            display: flex; 
            align-items: center; 
            font-weight: 800; 
            color: var(--azul-id) !important; 
            font-size: 1.6rem; 
        }
        .logo-nav { 
            height: 40px; 
            margin-right: 15px; 
        }
        .btn-volver { 
            border: 1.5px solid var(--azul-id); 
            color: var(--azul-id); 
            font-weight: 600; 
            border-radius: 12px; 
            padding: 6px 25px; 
            text-decoration: none !important; 
            transition: 0.3s; 
        }
        .btn-volver:hover { 
            background: var(--azul-id); 
            color: white !important; 
        }

        /* HERO BANNER */
        .hero-banner { 
            background: linear-gradient(90deg, #193E9A 0%, #317F77 100%); 
            padding: 50px 20px; 
            text-align: center; 
            color: white; 
            margin-bottom: 30px; 
        }
        .hero-banner h1 { 
            font-weight: 800; 
            font-size: 2.8rem; 
            margin-bottom: 10px; 
        }
        
        /* BUSCADOR */
        .search-container { 
            max-width: 600px; 
            margin: 0 auto 40px; 
        }
        .search-box-wrapper {
            display: flex;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            background: white;
            padding: 10px;
            border-radius: 15px;
            border: 1px solid #ddd;
        }
        #matriculaInput { 
            border: 1px solid #ced4da; 
            border-radius: 10px;
            padding-left: 15px; 
            height: 50px; 
            font-size: 1.1rem; 
            font-weight: 600;
        }
        .btn-buscar { 
            background: var(--verde-id) !important; 
            color: white !important; 
            border: none !important; 
            border-radius: 10px !important;
            padding: 0 35px; 
            font-weight: 800; 
            height: 50px;
        }

        .version-tag {
            font-size: 0.78rem;
            color: #a0aec0;
            margin-top: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* DISEÑO DE LA BOLETA MODERNA */
        .report-card-container {
            background: var(--blanco);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.1);
            margin: 0 auto 50px;
            max-width: 850px;
            display: none;
            position: relative;
            overflow: hidden;
        }

        .sello-agua-fondo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-10deg);
            width: 420px;
            height: auto;
            opacity: 0.05;
            pointer-events: none;
            z-index: 1;
        }

        .contenedor-sello-dorado {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 35px;
            padding-top: 10px;
            position: relative;
        }
        .sello-dorado {
            width: 150px; 
            height: auto;
            opacity: 0.95;
            mix-blend-mode: multiply;
            pointer-events: none;
        }

        .boleta-content-wrapper {
            position: relative;
            z-index: 2;
        }

        .header-boleta {
            margin: -40px -40px 30px -40px;
            padding: 30px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #fff;
            border-bottom: 2px solid #edf2f7;
        }
        
        .logo-boleta { height: 95px; }
        .school-info { text-align: right; }
        .school-name { font-weight: 800; font-size: 1.7rem; color: var(--azul-id); margin: 0; }
        .school-subtitle { font-weight: 700; font-size: 1.1rem; color: var(--verde-id); margin: 2px 0 0; }
        .school-address { font-size: 0.75rem; margin: 4px 0 0; color: #718096; line-height: 1.3; }

        .boleta-title-box { text-align: center; margin-bottom: 25px; }
        
        .bg-titulo-maternal { background-color: #FFF5B7 !important; color: #5d4037 !important; }
        .bg-titulo-preescolar { background-color: #FFB7CE !important; color: #4a148c !important; }
        .bg-titulo-primaria { background-color: #C1E7C4 !important; color: #1b5e20 !important; }
        .bg-titulo-secundaria { background-color: #B3E5FC !important; color: #0d47a1 !important; }
        .bg-titulo-prepa { background-color: #E1BEE7 !important; color: #4a148c !important; }

        .boleta-title-text {
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            padding: 10px 35px;
            border-radius: 20px;
            display: inline-block;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .student-info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            background-color: #F7FAFC;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }
        .info-item { display: flex; align-items: center; }
        .info-label { font-weight: 700; color: #4A5568; min-width: 120px; text-transform: uppercase; font-size: 0.75rem; }
        .info-value { flex-grow: 1; background-color: var(--blanco); padding: 6px 12px; border-radius: 8px; font-weight: 600; color: #2d3748; border: 1px solid #E2E8F0; }
        
        .final-grade-box {
            grid-column: span 2;
            background-color: #EBF8FF;
            border: 1px solid #90CDF4;
            border-radius: 10px;
            padding: 10px 20px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-top: 5px;
        }
        .final-grade-label { font-weight: 800; text-transform: uppercase; color: #2C5282; margin-right: 15px; font-size: 0.85rem; }
        .final-grade-value { font-size: 1.7rem; font-weight: 900; color: #2B6CB0; line-height: 1; }

        /* TABLAS ACCESIBLES */
        .grade-table-container { border-radius: 15px; overflow: hidden; border: 1px solid #E2E8F0; margin-bottom: 20px; }
        .grade-table { width: 100%; border-collapse: separate; border-spacing: 0; margin: 0; }
        .grade-table thead th { font-weight: 800; text-transform: uppercase; font-size: 0.82rem; padding: 14px 10px; text-align: center; border: none; }
        .grade-table thead th.subject-col { text-align: left; padding-left: 25px; }
        .grade-table tbody tr td { padding: 14px 10px; text-align: center; font-weight: 700; font-size: 0.95rem; border: none; border-bottom: 1px solid rgba(0,0,0,0.04) !important; }
        .grade-table tbody tr td.subject-col { text-align: left; padding-left: 25px; font-weight: 800; }

        /* PALETAS DE COLOR TEMÁTICAS */
        .pastel-amarillo thead th { background-color: #FBC02D !important; color: #5d4037 !important; }
        .pastel-amarillo tbody tr td { background-color: #FFF9C4 !important; color: #5d4037 !important; }
        .pastel-amarillo tbody tr td.promedio-col { background-color: #FBC02D !important; font-weight: 900 !important; }

        .pastel-preescolar thead th { background-color: #F48FB1 !important; color: #4a148c !important; }
        .pastel-preescolar tbody tr td { background-color: #FCE4EC !important; color: #4a148c !important; }
        .pastel-preescolar tbody tr td.promedio-col { background-color: #F48FB1 !important; font-weight: 900 !important; }

        .pastel-verde thead th { background-color: #81C784 !important; color: #1b5e20 !important; }
        .pastel-verde tbody tr td { background-color: #E8F5E9 !important; color: #1b5e20 !important; }
        .pastel-verde tbody tr td.promedio-col { background-color: #81C784 !important; font-weight: 900 !important; }

        .pastel-azul thead th { background-color: #4FC3F7 !important; color: #0d47a1 !important; }
        .pastel-azul tbody tr td { background-color: #E1F5FE !important; color: #0d47a1 !important; }
        .pastel-azul tbody tr td.promedio-col { background-color: #4FC3F7 !important; font-weight: 900 !important; }

        .pastel-lila thead th { background-color: #BA68C8 !important; color: #4a148c !important; }
        .pastel-lila tbody tr td { background-color: #F3E5F5 !important; color: #4a148c !important; }
        .pastel-lila tbody tr td.promedio-col { background-color: #BA68C8 !important; font-weight: 900 !important; }

        @media print {
            body { background-color: white !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .no-print, .hero-banner, .search-container, .navbar { display: none !important; }
            .report-card-container { display: block !important; border: none; box-shadow: none; padding: 0; margin: 0; width: 100%; max-width: 100%; border-radius: 0; }
            .header-boleta { margin: 0 0 30px 0; padding: 20px 0; }
            .page-break { page-break-before: always; }
            .sello-agua-fondo { opacity: 0.06 !important; }
            .sello-dorado { opacity: 1 !important; filter: none !important; }
        }
    </style>
</head>

<body>

    <nav class="navbar no-print">
        <div class="navbar-brand"><img src="Iconos/logo.png" class="logo-nav"> Colegio Niños Héroes</div>
        <a href="comunidad.html" class="btn-volver">← Volver</a>
    </nav>

    <div class="hero-banner no-print">
        <div class="container">
            <h1>Portal de Boletas Oficiales</h1>
            <p>Introduce la matrícula del alumno para generar sus boletas institucionales.</p>
        </div>
    </div>

    <div class="container search-container no-print">
        <div class="search-box-wrapper">
            <input type="text" id="matriculaInput" class="form-control" placeholder="Ingrese la matrícula del alumno...">
            <button class="btn btn-buscar" onclick="buscarBoletasAPI()">BUSCAR</button>
        </div>
        
        <div class="text-center version-tag">
            <i class="fas fa-cloud mr-1"></i> Conexión Segura vía Google Apps Script (2026) 4:35
        </div>
        
        <div id="statusMsg" class="text-center mt-3 font-weight-bold"></div>
        <div class="text-center mt-3" id="printBtnContainer" style="display:none;">
            <button class="btn btn-danger btn-lg shadow" onclick="window.print()">
                <i class="fas fa-file-pdf mr-2"></i> DESCARGAR PDF / IMPRIMIR BOLETAS
            </button>
        </div>
    </div>

    <div id="reportCardExtra" class="report-card-container"></div>
    <div id="reportCardIngles" class="report-card-container page-break"></div>

    <script>
        // URLs oficiales generadas e implementadas por el usuario
        const URL_WEBAPP_EXTRA = "https://script.google.com/macros/s/AKfycbyYmL_kKe7OgFDZegue1IC5vIwPraU_I2o96GAQQ4Z-6oMauaT22ZgHJQBmLH_2aHMmTg/exec";
        const URL_WEBAPP_INGLES = "https://script.google.com/macros/s/AKfycbwtw8CEQBEgcFIvW1SJgIi_6xaqZxwtKvTd0xLSYJ0JlLs1jH8W-nIODd1p0Y7mP_4Tvw/exec";

        const MATERIAS_MAP = {
            ingles: (n) => {
                const nl = n.toUpperCase();
                if (nl.includes('MATERNAL') || nl.includes('KINDER') || nl.includes('PREESCOLAR')) return ['LISTENING', 'READING'];
                return ['LISTENING', 'READING', 'WRITING', 'SPEAKING', 'COMPOSITION'];
            },
            extra: (n) => {
                const nl = n.toUpperCase();
                if (nl.includes('MATERNAL') || nl.includes('KINDER') || nl.includes('PREESCOLAR')) return ['EDUCACIÓN FÍSICA', 'DANZA', 'MÚSICA', 'TOCHO BANDERA', 'TAEKWONDO', 'INFORMÁTICA', 'EMOCIONES'];
                if (nl.includes('PRIMARIA 1') || nl.includes('PRIMARIA 2')) return ['EDUCACIÓN FÍSICA', 'DANZA', 'MÚSICA', 'TOCHO BANDERA', 'TAEKWONDO', 'INFORMÁTICA', 'JUEGOS Y DESTREZAS', 'ROBÓTICA', 'EDUCACIÓN FINANCIERA', 'SISTÉMICA', 'LECTURA', 'SPELLING BEE'];
                if (nl.includes('PRIMARIA')) return ['EDUCACIÓN FÍSICA', 'DANZA', 'MÚSICA', 'TOCHO BANDERA', 'TAEKWONDO', 'INFORMÁTICA', 'JUEGOS Y DESTREZAS', 'ROBÓTICA', 'EDUCACIÓN FINANCIERA', 'SISTÉMICA'];
                if (nl.includes('SECUNDARIA 2')) return ['EDUCACIÓN FÍSICA', 'DANZA', 'ARTES', 'MÚSICA', 'TOCHO BANDERA', 'TAEKWONDO', 'INFORMÁTICA', 'HERRAMIENTAS DIGITALES', 'AJEDREZ', 'ROBÓTICA', 'ORTOGRAFÍA', 'SISTÉMICA'];
                if (nl.includes('SECUNDARIA')) return ['EDUCACIÓN FÍSICA', 'DANZA', 'ARTES', 'MÚSICA', 'TOCHO BANDERA', 'TAEKWONDO', 'INFORMÁTICA', 'HERRAMIENTAS DIGITALES', 'AJEDREZ', 'ROBÓTICA', 'SISTÉMICA'];
                if (nl.includes('PREPARATORIA')) return ['EDUCACIÓN FÍSICA', 'DANZA', 'ARTES', 'TOCHO BANDERA', 'TAEKWONDO', 'INFORMÁTICA', 'HERRAMIENTAS DIGITALES', 'AJEDREZ', 'ROBÓTICA'];
                return [];
            }
        };

        function obtenerClaseColor(nivel) {
            const n = nivel.toUpperCase();
            if (n.includes('MATERNAL')) return 'pastel-amarillo';
            if (n.includes('KINDER') || n.includes('PREESCOLAR')) return 'pastel-preescolar';
            if (n.includes('PRIMARIA')) return 'pastel-verde';
            if (n.includes('SECUNDARIA')) return 'pastel-azul';
            if (n.includes('PREPARATORIA')) return 'pastel-lila';
            return '';
        }

        function obtenerClaseClaseTitulo(nivel) {
            const n = nivel.toUpperCase();
            if (n.includes('MATERNAL')) return 'bg-titulo-maternal';
            if (n.includes('KINDER') || n.includes('PREESCOLAR')) return 'bg-titulo-preescolar';
            if (n.includes('PRIMARIA')) return 'bg-titulo-primaria';
            if (n.includes('SECUNDARIA')) return 'bg-titulo-secundaria';
            if (n.includes('PREPARATORIA')) return 'bg-titulo-prepa';
            return '';
        }

        const fmt = (v) => {
            if (v === undefined || v === null || v === "" || isNaN(v)) return '-';
            return (Math.floor(parseFloat(v) * 10) / 10).toFixed(1);
        };

        function normalizarTexto(texto) {
            if (!texto) return "";
            return texto.toString().trim().toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        }

        async function buscarBoletasAPI() {
            const mat = document.getElementById('matriculaInput').value.trim();
            const status = document.getElementById('statusMsg');

            if (!mat) { status.innerText = "Por favor, ingrese una matrícula válida."; return; }

            status.innerHTML = "<i class='fas fa-spinner fa-spin mr-2'></i>Buscando alumno en registros oficiales...";
            
            document.getElementById('reportCardExtra').style.display = 'none';
            document.getElementById('reportCardIngles').style.display = 'none';
            document.getElementById('printBtnContainer').style.display = 'none';

            try {
                const [resExtra, resIngles] = await Promise.all([
                    fetch(`${URL_WEBAPP_EXTRA}?matricula=${encodeURIComponent(mat)}`).then(r => r.json()),
                    fetch(`${URL_WEBAPP_INGLES}?matricula=${encodeURIComponent(mat)}`).then(r => r.json())
                ]);

                if (resExtra.encontrado || resIngles.encontrado) {
                    status.innerHTML = "<span class='text-success'>¡Información cargada correctamente!</span>";
                    document.getElementById('printBtnContainer').style.display = 'block';

                    if (resExtra.encontrado) procesarYRenderizar(resExtra, 'Extra', 'ASIGNATURAS EXTRACURRICULARES', 'extra');
                    if (resIngles.encontrado) procesarYRenderizar(resIngles, 'Ingles', 'BOLETA DE INGLÉS', 'ingles');
                } else {
                    status.innerHTML = `<span class='text-danger'>La matrícula "${mat}" no se encuentra en las listas.</span>`;
                }
            } catch (error) {
                console.error(error);
                status.innerHTML = "<span class='text-danger'>Error de comunicación. Asegúrate de haber guardado e implementado correctamente las Apps Script como Públicas.</span>";
            }
        }

        function procesarYRenderizar(res, idS, tituloFormateado, tipoMateria) {
            const studentRow = res.studentRow;
            const materiasRow = res.materiasRow;
            const jump = res.esPrepa ? 3 : 4;
            
            const filtroOriginal = MATERIAS_MAP[tipoMateria](res.nivel);
            const filtroNormalizado = filtroOriginal.map(m => normalizarTexto(m));
            let listaMaterias = [];

            for (let i = 5; i < studentRow.length; i += jump) {
                if (materiasRow[i] && (materiasRow[i].toString().trim().toUpperCase().includes("CICLO") || materiasRow[i].toString().trim().toUpperCase().includes("PROMEDIO"))) {
                    break;
                }

                let nombreMateriaCelda = materiasRow[i] ? materiasRow[i].toString().trim() : "";
                let nombreMateriaNorm = normalizarTexto(nombreMateriaCelda);

                if (nombreMateriaNorm && filtroNormalizado.includes(nombreMateriaNorm)) {
                    listaMaterias.push({
                        n: nombreMateriaCelda.toUpperCase(),
                        v1: fmt(studentRow[i]),             
                        v2: fmt(studentRow[i+1]),           
                        v3: res.esPrepa ? null : fmt(studentRow[i+2]), 
                        vf: res.esPrepa ? fmt(studentRow[i+2]) : fmt(studentRow[i+3]) 
                    });
                }
            }

            let pf = "-";
            for (let k = studentRow.length - 1; k >= 5; k--) {
                if (studentRow[k] && !isNaN(studentRow[k]) && studentRow[k].toString().trim() !== "") {
                    pf = fmt(studentRow[k]);
                    break;
                }
            }

            const div = document.getElementById(`reportCard${idS}`);
            div.style.display = 'block';
            
            const clasePastel = obtenerClaseColor(res.nivel);
            const claseTituloColor = obtenerClaseClaseTitulo(res.nivel);

            div.innerHTML = `
                <img src="Iconos/logo.png" class="sello-agua-fondo">
                <div class="boleta-content-wrapper">
                    <div class="header-boleta">
                        <img src="Iconos/logo.png" class="logo-boleta">
                        <div class="school-info">
                            <h1 class="school-name">COLEGIO NIÑOS HÉROES</h1>
                            <h2 class="school-subtitle">Sección Académica</h2>
                            <p class="school-address">DURANGO S/N AMP. ADOLFO LÓPEZ MATEOS, ATIZAPÁN DE ZARAGOZA.<br>TELS: 58204881 Y 5590557078</p>
                        </div>
                    </div>

                    <div class="boleta-title-box">
                        <div class="boleta-title-text ${claseTituloColor}">${tituloFormateado}</div>
                    </div>

                    <div class="student-info-grid">
                        <div class="info-item"><span class="info-label">Ciclo Escolar:</span> <span class="info-value">${res.ciclo}</span></div>
                        <div class="info-item"><span class="info-label">Grado:</span> <span class="info-value">${res.grado}</span></div>
                        <div class="info-item"><span class="info-label">Alumno:</span> <span class="info-value">${res.nombre}</span></div>
                        <div class="info-item"><span class="info-label">Grupo:</span> <span class="info-value">${res.grupo}</span></div>
                        
                        <div class="final-grade-box">
                            <span class="final-grade-label">Calificación Final General:</span>
                            <span class="final-grade-value">${pf}</span>
                        </div>
                    </div>

                    <p style="font-style: italic; font-size: 0.82rem; text-align: center; margin: 25px 0; color: #718096; padding: 0 30px; line-height: 1.4;">
                        "La educación no solo forma estudiantes, forma seres humanos capaces de soñar en grande, de levantarse ante las dificultades y de construir con esfuerzo y valores el futuro que deseas alcanzar."
                    </p>

                    <div class="grade-table-container">
                        <table class="grade-table ${clasePastel}">
                            <thead>
                                <tr>
                                    <th class="subject-col">Materias</th>
                                    ${res.esPrepa ? '<th>1er Sem</th><th>2do Sem</th>' : '<th>1er Trim</th><th>2do Trim</th><th>3er Trim</th>'}
                                    <th>Promedio Final</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${listaMaterias.map(m => `
                                    <tr>
                                        <td class="subject-col">${m.n}</td>
                                        <td>${m.v1}</td>
                                        <td>${m.v2}</td>
                                        ${!res.esPrepa ? `<td>${m.v3}</td>` : ''}
                                        <td class="promedio-col">${m.vf}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>

                    <div class="contenedor-sello-dorado">
                        <img src="Iconos/sello.png" class="sello-dorado">
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
